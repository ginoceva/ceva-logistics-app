name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl requests

      - name: Build APK
        run: |
          # Usamos --non-interactive para evitar que pida confirmación en el servidor
          flet build apk --project "CEVA Flow" --org "com.ceva.logistics" --non-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ceva-logistics-apk
          path: build/apk/*.apk
