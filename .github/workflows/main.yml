name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl requests

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.2' # Versión estable recomendada para Flet 0.23
          channel: 'stable'

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          # Usamos flet build apk con verbosidad para detectar el punto exacto de fallo
          flet build apk --project "CEVA_Flow" --org "com.ceva.logistics" --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ceva-logistics-apk
          path: build/apk/*.apk
