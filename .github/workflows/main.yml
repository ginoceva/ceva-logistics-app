name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.2'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl requests

      - name: Build APK
        run: |
          # Usamos 'yes' para responder automáticamente a cualquier aviso de Flet
          yes | flet build apk --project "CEVA Flow" --org "com.ceva.logistics"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ceva-logistics-apk
          path: build/apk/*.apk
