name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pandas openpyxl requests

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4' # Version requested by flet-cli 0.82.0
          channel: 'stable'

      - name: Accept Android Licenses
        run: |
          yes | flutter doctor --android-licenses || true
          yes | sdkmanager --licenses || true

      - name: Build APK
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # Usamos 'yes |' por si acaso, aunque licenciando antes debería ir fluido
          yes | flet build apk --project "CEVA_Flow" --org "com.ceva.logistics"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ceva-logistics-apk
          path: build/apk/*.apk
